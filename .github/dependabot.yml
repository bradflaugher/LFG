version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  # Maintain dependencies for Gradle (Android project)
  - package-ecosystem: "gradle"
    directory: "/android/src"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      gradle-dependencies:
        patterns:
          - "*"
