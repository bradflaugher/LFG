version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]
    labels: [dependencies, go]
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      gh-actions:
        patterns: ["*"]
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"
      include: scope
