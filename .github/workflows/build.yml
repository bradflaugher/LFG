name: Build

on:
  push:
    branches: [main]
    paths:
      - android/**
      - .github/workflows/build.yml
  pull_request:
    branches: [main]
    paths:
      - android/**
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  build:
    name: Assemble + test (debug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Gradle wrapper executable
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew test

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lfe-debug-apk
          path: android/src/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
