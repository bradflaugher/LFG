name: Build

# PR-side sanity check: unit tests + instrumented tests on an Android 16
# emulator. Catches DI / Compose / launch crashes before they merge.

on:
  pull_request:
    branches: [main]
    paths:
      - android/**
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  build:
    name: Test + assemble debug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Gradle wrapper executable
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew test

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api36-x86_64-v1

      - name: Create AVD + warm cache (first run only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android/src
          script: echo "AVD cache warmed."

      - name: Instrumented tests on Android 16 (API 36)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android/src
          script: ./gradlew connectedDebugAndroidTest --info

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lfe-debug-apk
          path: android/src/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
