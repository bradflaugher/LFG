name: CI

# All the checks, in parallel:
#   • lint           — Android Lint, ~30 s
#   • unit-test      — JVM tests,  ~30 s
#   • assemble       — debug APK,  ~2 min, uploaded as artifact
#   • instrumented   — Android 16 emulator + connectedDebugAndroidTest,
#                      ~7 min with warm AVD cache, ~20 min cold.
#                      The most valuable check we have — catches runtime
#                      Hilt/Compose/launch failures the others miss.
#
# Runs on PRs (so merge is gated on a real device run) and on push to main
# (so release.yml downstream can trust the gate).
#
# Every gradle invocation is wrapped in a small bash retry loop because
# Maven Central occasionally serves a 403 mid-resolve (see e.g. the merge
# of #4: same artifact resolved fine in three sibling jobs in the same
# run, 403'd in this one) and the emulator runner has historically
# reported "no compatible devices connected" on the first boot of a
# cold-cached AVD. Two attempts with a 30s gap clears both classes of
# flake without masking a real failure (real test failures still fail
# both attempts and surface in ~the same wall time as a single run).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-android
      - name: Lint (with retry on transient Maven errors)
        run: |
          for attempt in 1 2; do
            echo "::group::Lint (attempt $attempt)"
            if ./gradlew :app:lint; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          exit 1

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-android
      - name: Unit tests (with retry on transient Maven errors)
        env:
          HYPER_API_KEY: ${{ secrets.HYPER_API_KEY }}
          HYPER_API_ENDPOINT: ${{ secrets.HYPER_API_ENDPOINT }}
        run: |
          for attempt in 1 2; do
            echo "::group::Unit tests (attempt $attempt)"
            if ./gradlew :app:testDebugUnitTest; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          exit 1
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-report
          path: android/src/app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

  assemble:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-android
      - name: Assemble debug APK (with retry on transient Maven errors)
        run: |
          for attempt in 1 2; do
            echo "::group::Assemble (attempt $attempt)"
            if ./gradlew :app:assembleDebug; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          exit 1
      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: lfg-debug-apk-${{ github.sha }}
          path: android/src/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

  instrumented:
    name: Emulator (Android 16)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: android/src
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-android

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api36-x86_64-v1

      - name: Create AVD + warm cache (first run only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          working-directory: android/src
          script: echo "AVD cache warmed."

      # First attempt. If the emulator boots cleanly and ADB sees a device the
      # tests run as normal; if the runner reports "no compatible devices
      # connected" (or any other infra error) we fall through to the retry below.
      - name: Run instrumented tests
        id: instrumented-1
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          working-directory: android/src
          script: ADB_INSTALL_TIMEOUT=10 ./gradlew connectedDebugAndroidTest --info

      - name: Run instrumented tests (retry)
        if: steps.instrumented-1.outcome == 'failure'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          working-directory: android/src
          script: ADB_INSTALL_TIMEOUT=10 ./gradlew connectedDebugAndroidTest --info

      - name: Upload instrumented report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-report
          path: android/src/app/build/reports/androidTests/
          retention-days: 14

  jules-autofix:
    name: Jules Auto-Fix on Failure
    runs-on: ubuntu-latest
    needs: [lint, unit-test, assemble, instrumented]
    if: failure() && github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            The CI/CD pipeline failed on this PR branch.
            Please run the unit tests and linter locally (under `android/src` using `./gradlew test` and `./gradlew lint` with Android SDK path).
            Locate the compilation error or test failure, fix it, commit the fix, and push the commit directly back to this branch to make it green.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
