name: CI

# All the checks, in parallel:
#   • lint           — Android Lint, ~30 s
#   • unit-test      — JVM tests,  ~30 s
#   • assemble       — debug APK,  ~2 min, uploaded as artifact
#   • instrumented   — Android 16 emulator + connectedDebugAndroidTest,
#                      ~7 min with warm AVD cache, ~20 min cold.
#                      The most valuable check we have — catches runtime
#                      Hilt/Compose/launch failures the others miss.
#
# Runs on PRs (so merge is gated on a real device run) and on push to main
# (so release.yml downstream can trust the gate).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android
      - run: ./gradlew :app:lint

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android
      - run: ./gradlew :app:testDebugUnitTest
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: android/src/app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

  assemble:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android
      - run: ./gradlew :app:assembleDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lfe-debug-apk-${{ github.sha }}
          path: android/src/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

  instrumented:
    name: Emulator (Android 16)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: android/src
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api36-x86_64-v1

      - name: Create AVD + warm cache (first run only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android/src
          script: echo "AVD cache warmed."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android/src
          script: ./gradlew connectedDebugAndroidTest --info

      - name: Upload instrumented report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: android/src/app/build/reports/androidTests/
          retention-days: 14
