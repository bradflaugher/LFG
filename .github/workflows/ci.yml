name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files need gofmt:"
            gofmt -l .
            exit 1
          fi
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: GOTOOLCHAIN=auto go vet ./...
      - name: go test
        run: GOTOOLCHAIN=auto go test -race ./...
      - name: go build
        run: GOTOOLCHAIN=auto go build -o /tmp/lfg ./cmd/lfg
