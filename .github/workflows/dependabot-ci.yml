name: Dependabot Secure CI & Auto-Fix

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  run-secure-checks:
    name: Run tests with secrets for Dependabot
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].user.login == 'dependabot[bot]' &&
      github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: android/src
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          repository: ${{ github.event.workflow_run.head_repository.full_name }}

      - name: Setup Android SDK and Java
        uses: ./.github/actions/setup-android

      - name: Run Unit Tests with secrets
        env:
          HYPER_API_KEY: ${{ secrets.HYPER_API_KEY }}
          HYPER_API_ENDPOINT: ${{ secrets.HYPER_API_ENDPOINT }}
        run: |
          for attempt in 1 2; do
            echo "::group::Unit tests (attempt $attempt)"
            if ./gradlew :app:testDebugUnitTest; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          exit 1

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api36-x86_64-v1

      - name: Create AVD + warm cache (first run only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          working-directory: android/src
          script: echo "AVD cache warmed."

      - name: Run instrumented tests
        id: instrumented-1
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          working-directory: android/src
          script: ADB_INSTALL_TIMEOUT=10 ./gradlew connectedDebugAndroidTest --info

      - name: Run instrumented tests (retry)
        if: steps.instrumented-1.outcome == 'failure'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          working-directory: android/src
          script: ADB_INSTALL_TIMEOUT=10 ./gradlew connectedDebugAndroidTest --info

  dependabot-automerge:
    name: Auto-merge passing Dependabot PR
    runs-on: ubuntu-latest
    needs: run-secure-checks
    if: success()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
      - name: Merge PR
        run: |
          gh pr merge ${{ github.event.workflow_run.pull_requests[0].number }} --merge --auto

  jules-autofix:
    name: Jules Auto-Fix on Failure
    runs-on: ubuntu-latest
    needs: run-secure-checks
    if: failure()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          repository: ${{ github.event.workflow_run.head_repository.full_name }}

      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            The CI/CD pipeline failed on this Dependabot PR branch.
            Please run the unit tests and linter locally (under `android/src` using `./gradlew test` and `./gradlew lint` with Android SDK path).
            Locate the compilation error or test failure, fix it, commit the fix, and push the commit directly back to this branch to make it green.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
