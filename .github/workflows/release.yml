name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build + publish release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Gradle wrapper executable
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew test

      - name: Assemble release APK (debug-signed)
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        id: rename
        run: |
          set -e
          shopt -s nullglob
          apk=(app/build/outputs/apk/release/*.apk)
          if [ ${#apk[@]} -eq 0 ]; then
            echo "no APK produced" >&2
            exit 1
          fi
          ver="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          out="lfe-${ver}.apk"
          cp "${apk[0]}" "${out}"
          echo "apk=${PWD}/${out}" >> "$GITHUB_OUTPUT"
          echo "tag=${ver}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rename.outputs.tag }}
          name: LFE ${{ steps.rename.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.rename.outputs.apk }}
          body: |
            Debug-signed sideload APK. Install with:
            ```
            adb install -r lfe-${{ steps.rename.outputs.tag }}.apk
            ```
