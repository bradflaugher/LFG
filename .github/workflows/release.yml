name: Release

# Every push to main builds a fresh APK and publishes it as a new GitHub Release
# named `build-YYYY-MM-DD-HHMM-<sha7>`. All builds stay forever — the Releases
# page is your historical archive, and /releases/latest always points at the
# newest one.
#
# Before publishing we boot an Android 16 (API 36) emulator and run
# `connectedDebugAndroidTest` so DI / Compose / launch crashes fail the build
# instead of shipping a broken APK.

on:
  push:
    branches: [main]
    paths:
      - android/**
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Test + publish APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Gradle wrapper executable
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew test

      # KVM is available on GitHub-hosted ubuntu-latest runners as of 2024+;
      # the emulator-runner action expects /dev/kvm to be world-readable.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api36-x86_64-v1

      - name: Create AVD + warm cache (first run only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android/src
          script: echo "AVD cache warmed."

      - name: Instrumented tests on Android 16 (API 36)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android/src
          script: ./gradlew connectedDebugAndroidTest --info

      - name: Assemble release APK (debug-signed)
        run: ./gradlew assembleRelease

      - name: Compute build identifier
        id: ident
        run: |
          set -e
          stamp="$(date -u +%Y-%m-%d-%H%M)"
          sha7="${GITHUB_SHA:0:7}"
          tag="build-${stamp}-${sha7}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "stamp=$stamp" >> "$GITHUB_OUTPUT"

      - name: Rename APK with build identifier
        id: rename
        run: |
          set -e
          shopt -s nullglob
          apk=(app/build/outputs/apk/release/*.apk)
          if [ ${#apk[@]} -eq 0 ]; then
            echo "no APK produced" >&2
            exit 1
          fi
          out="lfe-${{ steps.ident.outputs.tag }}.apk"
          cp "${apk[0]}" "${out}"
          echo "apk=${PWD}/${out}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ident.outputs.tag }}
          name: ${{ steps.ident.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.rename.outputs.apk }}
          body: |
            Debug-signed sideload APK from commit `${{ github.sha }}`
            (built ${{ steps.ident.outputs.stamp }} UTC).

            Install:
            ```
            adb install -r lfe-${{ steps.ident.outputs.tag }}.apk
            ```

            **First-time sideloaders on Android 12+:** enable
            *Settings → Apps → Special access → Install unknown apps* for
            your file manager, then tap the APK.
