name: Release

# Publishes a dated APK to GitHub Releases. Fires only after `CI` passes on
# the corresponding commit — and `CI` includes the Android 16 emulator gate.
# So /releases/latest is always backed by a green device run.
#
# Release tag format: build-YYYY-MM-DD-HHMM-<sha7>. All historical builds
# stay on the Releases page.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA to release (default = current main HEAD)
        required: false

permissions:
  contents: write

jobs:
  release:
    name: Publish APK
    permissions:
      contents: write
    # Only run if Instrumented succeeded; dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/src

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.sha || github.sha }}

      - uses: ./.github/actions/setup-android

      - name: Decode Keystore
        id: decode_keystore
        env:
          LFG_RELEASE_KEYSTORE_BASE64: ${{ secrets.LFG_RELEASE_KEYSTORE_BASE64 }}
          LFG_RELEASE_STORE_PASSWORD: ${{ secrets.LFG_RELEASE_STORE_PASSWORD }}
          LFG_RELEASE_KEY_ALIAS: ${{ secrets.LFG_RELEASE_KEY_ALIAS }}
          LFG_RELEASE_KEY_PASSWORD: ${{ secrets.LFG_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$LFG_RELEASE_KEYSTORE_BASE64" ] && [ -n "$LFG_RELEASE_STORE_PASSWORD" ] && [ -n "$LFG_RELEASE_KEY_ALIAS" ] && [ -n "$LFG_RELEASE_KEY_PASSWORD" ]; then
            echo "$LFG_RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
            echo "path=${{ github.workspace }}/android/src/release.keystore" >> "$GITHUB_OUTPUT"
          else
            echo "Signing keys are missing or incomplete. Skipping release signing and falling back to debug signing."
          fi

      - name: Assemble release APK
        env:
          LFG_RELEASE_STORE_PASSWORD: ${{ secrets.LFG_RELEASE_STORE_PASSWORD }}
          LFG_RELEASE_KEY_ALIAS: ${{ secrets.LFG_RELEASE_KEY_ALIAS }}
          LFG_RELEASE_KEY_PASSWORD: ${{ secrets.LFG_RELEASE_KEY_PASSWORD }}
        run: |
          LFG_RELEASE_STORE_FILE="${{ steps.decode_keystore.outputs.path }}"
          if [ -n "$LFG_RELEASE_STORE_FILE" ]; then
            ./gradlew assembleRelease \
              -PLFG_RELEASE_STORE_FILE="$LFG_RELEASE_STORE_FILE" \
              -PLFG_RELEASE_STORE_PASSWORD="$LFG_RELEASE_STORE_PASSWORD" \
              -PLFG_RELEASE_KEY_ALIAS="$LFG_RELEASE_KEY_ALIAS" \
              -PLFG_RELEASE_KEY_PASSWORD="$LFG_RELEASE_KEY_PASSWORD"
          else
            ./gradlew assembleRelease
          fi

      - name: Compute build identifier
        id: ident
        run: |
          set -e
          sha="${{ github.event.workflow_run.head_sha || github.event.inputs.sha || github.sha }}"
          stamp="$(date -u +%Y-%m-%d-%H%M)"
          sha7="${sha:0:7}"
          tag="build-${stamp}-${sha7}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "stamp=$stamp" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Rename APK with build identifier
        id: rename
        run: |
          set -e
          shopt -s nullglob
          apk=(app/build/outputs/apk/release/*.apk)
          if [ ${#apk[@]} -eq 0 ]; then
            echo "no APK produced" >&2
            exit 1
          fi
          out="lfg-${{ steps.ident.outputs.tag }}.apk"
          cp "${apk[0]}" "${out}"
          echo "apk=${PWD}/${out}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > release_notes.md
          Sideload APK from commit `${{ steps.ident.outputs.sha }}`
          (built ${{ steps.ident.outputs.stamp }} UTC, gated by
          [Instrumented](../../actions/workflows/instrumented.yml) success).

          Install:
          ```
          adb install -r lfg-${{ steps.ident.outputs.tag }}.apk
          ```

          **First-time sideloaders:** LFG strictly targets the latest
          Android releases. If you need help, check out the official Google
          guide on [how to install apps from other sources on Android](https://support.google.com/googleplay/answer/14669046).
          EOF

          gh release create "${{ steps.ident.outputs.tag }}" \
            --title "${{ steps.ident.outputs.tag }}" \
            --target "${{ steps.ident.outputs.sha }}" \
            --generate-notes \
            --notes-file release_notes.md \
            "${{ steps.rename.outputs.apk }}"
