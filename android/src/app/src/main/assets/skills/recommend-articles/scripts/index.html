  Persona + feed-source storage for the `recommend-articles` skill.
  All state lives in localStorage on this WebView origin — no network.
-->
<html lang="en">
<body>
<script>
  const STORAGE_KEY = 'recommend_articles_data';
  const DEFAULT_FEEDS = ['https://www.nytimes.com'];

  function readState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {persona: '', feeds: []};
    try {
      const parsed = JSON.parse(raw);
      return {
        persona: typeof parsed.persona === 'string' ? parsed.persona : '',
        feeds: Array.isArray(parsed.feeds) ? parsed.feeds : [],
      };
    } catch (_) {
      return {persona: '', feeds: []};
    }
  }

  function writeState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function normalizeUrl(input) {
    if (!input || typeof input !== 'string') return '';
    let s = input.trim();
    if (!s) return '';
    if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
    try {
      const u = new URL(s);
      // Strip trailing slash from path for stable dedupe.
      return (u.origin + (u.pathname === '/' ? '' : u.pathname.replace(/\/$/, ''))).toLowerCase();
    } catch (_) {
      return '';
    }
  }

  window['ai_edge_gallery_get_result'] = async (dataStr) => {
    try {
      const params = JSON.parse(dataStr || '{}');
      const action = (params.action || '').toLowerCase();
      const state = readState();

      if (action === 'get_state') {
        const feeds = state.feeds.length ? state.feeds : DEFAULT_FEEDS;
        return JSON.stringify({persona: state.persona, feeds});
      }

      if (action === 'set_persona') {
        const persona = (params.persona || '').toString().trim();
        if (!persona) return JSON.stringify({error: 'persona is empty'});
        state.persona = persona;
        writeState(state);
        return JSON.stringify({ok: true, persona});
      }

      if (action === 'clear_persona') {
        state.persona = '';
        writeState(state);
        return JSON.stringify({ok: true});
      }

      if (action === 'list_feeds') {
        const feeds = state.feeds.length ? state.feeds : DEFAULT_FEEDS;
        return JSON.stringify({feeds, isDefault: state.feeds.length === 0});
      }

      if (action === 'add_feed') {
        const url = normalizeUrl(params.url);
        if (!url) return JSON.stringify({error: 'invalid url'});
        if (state.feeds.indexOf(url) >= 0) {
          return JSON.stringify({ok: true, feeds: state.feeds, alreadyPresent: true});
        }
        state.feeds.push(url);
        writeState(state);
        return JSON.stringify({ok: true, feeds: state.feeds});
      }

      if (action === 'remove_feed') {
        const url = normalizeUrl(params.url);
        if (!url) return JSON.stringify({error: 'invalid url'});
        const before = state.feeds.length;
        state.feeds = state.feeds.filter((f) => f !== url);
        writeState(state);
        return JSON.stringify({
          ok: true,
          feeds: state.feeds,
          removed: state.feeds.length !== before,
        });
      }

      if (action === 'reset') {
        localStorage.removeItem(STORAGE_KEY);
        return JSON.stringify({ok: true});
      }

      return JSON.stringify({error: 'unknown action: ' + action});
    } catch (e) {
      return JSON.stringify({error: 'exception: ' + (e && e.message)});
    }
  };
</script>
</body>
</html>
