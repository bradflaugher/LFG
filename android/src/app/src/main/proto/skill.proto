syntax = "proto3";

package com.bradflaugher.lfg.proto;

option java_multiple_files = true;
option java_outer_classname = "SkillProto";
option java_package = "com.bradflaugher.lfg.proto";

message Skills {
  repeated Skill skill = 1;
}

message Skill {
  string name = 1;
  string description = 2;
  string instructions = 3;

  // Whether the skill is built-in or not.
  bool built_in = 4;

  // The url where the SKILL.md is hosted.
  // Only used when the skill is added through a remote url.
  string skill_url = 5;

  // The dir name of the imported skill in app's private files dir.
  // Only used when the skill is imported.
  string import_dir_name = 6;

  // Whether the skill is selected.
  bool selected = 7;

  // Whether the skill requires a secret (API key, token, etc).
  bool require_secret = 8;

  // The description about the secret (e.g. how to get it).
  string require_secret_description = 10;

  // The homepage of the skill (source, doc).
  string homepage = 9;

  // Whether the user explicitly modified the selection of this skill.
  bool user_modified_selection = 11;
}
